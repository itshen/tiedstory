    <!-- JSON-LD 结构化数据 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",

        },
        "query-input": "required name=search_term_string"

    }

    <script type="application/ld+json">

      "@context": "https://schema.org",

    <link rel="stylesheet" href="/static/css/style.css">

            -webkit-user-select: none;

            user-select: none;
        }

</head>
<body>
<!-- SEO 语义内容区（搜索引擎可见，用户不可见） -->
<div style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;" aria-hidden="true">
  <h1>TiedStory 树洞 — 匿名情感倾诉平台</h1>

  <p>无论你是失恋难过、感到孤独、工作委屈、家庭烦恼、焦虑压力还是莫名难过，都可以在这里倾诉。</p>
  <nav>
    <a href="/about">关于 TiedStory 树洞</a>
    <a href="/topics">情绪专题</a>

{% block content %}{% endblock %}
<script>
    /* 禁止复制、剪切、右键菜单（见证码区域除外） */
    function isInWitnessCode(e) {
        return e.target && e.target.closest && e.target.closest('.tie-witness-code');
    }
    document.addEventListener('copy', function(e){ if (!isInWitnessCode(e)) e.preventDefault(); });
    document.addEventListener('cut', function(e){ if (!isInWitnessCode(e)) e.preventDefault(); });
    document.addEventListener('contextmenu', function(e){ if (!isInWitnessCode(e)) e.preventDefault(); });
    document.addEventListener('selectstart', function(e){ if (!isInWitnessCode(e)) e.preventDefault(); });

    /* 注册 Service Worker，拦截背景图请求走本地缓存 */
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function(err) {
            console.warn('[SW] 注册失败:', err);
        });
    }
</script>
</body>
</html>
