<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 40px;
      width: 360px;
    }
    h1 { color: #fff; font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { color: #666; font-size: 14px; margin-bottom: 28px; }
    label { display: block; color: #aaa; font-size: 13px; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #555; }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #111 inset;
      -webkit-text-fill-color: #fff;
      caret-color: #fff;
    }
    button {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #e8e8e8; }
    .error {
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      color: #f87171;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>管理员登录</h1>
    <p>TiedStory 后台管理系统</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <label>密码</label>
      <input type="password" name="password" autocomplete="off" autofocus>
      <button type="submit">登录</button>
    </form>
  </div>
</body>
</html>
