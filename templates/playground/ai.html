{% extends "base.html" %}

{% block content %}
<div class="ai-playground-layout">

    <!-- 左侧：Prompt 配置面板 -->
    <div class="prompt-panel">
        <div class="pg-section">
            <div class="pg-section-header">
                <h2>AI 配置 · 阿里云百炼</h2>
            </div>
            <div class="pg-section-body">

                <div class="form-group">
                    <label class="form-label">API Key</label>
                    <input type="text" id="api-key" class="form-control" placeholder="sk-xxxxx（为空则使用 .env）">
                </div>

                <!-- Prompt 预设 -->
                <div class="form-group">
                    <label class="form-label">预设 Prompt</label>
                    <div class="preset-btns">
                        <button class="preset-btn active" onclick="setPrompt('story', this)">树语·主提示词</button>
                        <button class="preset-btn" onclick="setPrompt('resonate', this)">共鸣过滤</button>
                        <button class="preset-btn" onclick="setPrompt('echo', this)">复读机</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">System Prompt</label>
                    <textarea id="system-prompt" class="form-control" style="height:340px; font-size:12px; font-family:monospace; line-height:1.5;"></textarea>
                </div>

                <button class="btn btn-outline" style="width:100%; justify-content:center;" onclick="clearChat()">
                    <img src="/static/icons/refresh-cw.svg" alt="">
                    清空对话
                </button>
            </div>
        </div>
    </div>

    <!-- 右侧：对话区 -->
    <div>
        <div class="chat-container">
            <div class="chat-header">
                <span class="chat-header-title">阿里云百炼 · qwen3.5-plus</span>
                <span style="font-size:12px; color:var(--ink-light);" id="msg-count">0 条对话</span>
            </div>
            <div class="chat-history" id="chat-history">
                <div class="message message-ai">
                    <div class="message-label">树语</div>
                    <div class="bubble">准备好了。输入一句破防的话，我会改写成故事并以 XML 格式返回。</div>
                </div>
            </div>
            <div class="chat-input-area">
                <form id="chat-form" onsubmit="event.preventDefault(); sendMessage();" style="display:flex; flex-direction:column; gap:10px;">
                    <textarea id="user-input" class="form-control" placeholder="输入测试内容，如：我妈今天又骂我，说我把孩子教成这样是我的错..." rows="2" style="border-radius:12px;"></textarea>
                    <div style="display:flex; justify-content:flex-end;">
                        <button type="submit" class="btn btn-primary" id="send-btn">
                            <img src="/static/icons/send.svg" alt="">
                            发送
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>

<script src="/static/js/ai-chat.js"></script>
{% endblock %}
